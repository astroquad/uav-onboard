[runtime]
target = "ardupilot_serial"
vision = "rpicam"

[transport]
kind = "serial"

[serial]
# Pixhawk 6C Mini over USB (Pi 5 companion). BENCH-VERIFY: fill in from
# `ls /dev/serial/by-id/` with the FC connected; keep in sync with
# config/pixhawk6c_indoor_flow.expected.toml. The previous value was the
# retired Pixhawk 1 (fmuv2) device.
device = "/dev/serial/by-id/usb-ArduPilot_Pixhawk6C_CHANGE-ME-if00"
baudrate = 115200

[safety.timeouts]
line_lost_ms = 5000
autopilot_heartbeat_lost_ms = 2000
mission_timeout_ms = 300000
# Vision-stale flyaway watchdog (real flight). Hold position at 800ms of no
# new camera frame, LAND at 4s. rpicam over the Pi 5 CSI is the source; a
# capture stall must not keep replaying the last forward velocity command.
vision_stale_hold_ms = 800
vision_stale_land_ms = 4000

[safety.rc]
assume_rc_present = false
rc_required = true
rc_lost_ms = 1500

# Real-flight debug video is monitored over the LG U+ LTE modem, so the
# competition path pins the LTE-sized profile explicitly instead of relying on
# the config/vision.toml base defaults (which SITL profiles override to
# LAN-fast 24fps/q70). Measured ~2.1-2.2 Mbit/s with FEC + 6fps telemetry;
# override per run with --fps/--video-width/--video-quality after re-probing.
[debug_video]
enabled = false
send_fps = 12
jpeg_quality = 55
send_width = 600
send_height = 0
chunk_pacing_us = 150
fec_group_size = 4

# Conservative gains for real flight with MTF-01 optical flow.
# MTF-01 position estimate has more drift than Gazebo SITL,
# so all gains are lower and smoothing is stronger.
[line_controller]
offset_kp = 0.25
angle_yaw_kp = 0.3
offset_yaw_kp = 0.0
max_lateral_mps = 0.25
max_yaw_rate_rad_s = 0.25
min_confidence = 0.40
offset_deadband_norm = 0.05
angle_deadband_deg = 5.0
invert_lateral = false
invert_yaw = false
# Stronger output smoothing for real flight: only 30% of new command passes through.
output_ema_alpha = 0.3
# Limit how fast lateral and yaw commands can change per control step.
# At 20 Hz control rate, this limits lateral acceleration to ~0.5 m/s/s
# and yaw acceleration to ~0.5 rad/s/s.
max_lateral_rate_mps = 0.025
max_yaw_rate_change_rad_s = 0.025
# Slow down when confidence is weak (confidence^0.5 scaling).
forward_confidence_scale = 0.5

[line_follow]
forward_mps = 0.20
desired_angle_deg = 90.0
duration_s = 60.0
lost_timeout_s = 5.0

[rc_override]
# DEPRECATED (2026-07): the ALT_HOLD + RC_CHANNELS_OVERRIDE control backend
# is retired. It bypasses EKF position stabilization, conflicts with RC
# failsafes, and every PWM constant below was hand-tuned for the previous
# 1.5kg/3S/T2212-920KV airframe — invalid on the 2.1kg/4S S500 V2. The only
# supported control path is GUIDED body-frame velocity setpoints. Kept for
# reference until tools/line_follow_node.cpp is retired; do not fly with it.
sender_system_id = 255
arm_throttle_pwm = 1000
throttle_hold_pwm = 1500
# 1.5kg-class 3S/T2212-920KV airframe: 1620 sat too close to AltHold's
# throttle deadband on the real frame and did not produce a clear climb.
takeoff_throttle_pwm = 1700
# Stick authority for line-follow RC override. With forward_mps=0.20 and
# pitch_full_scale_mps=0.50, pitch command is about 32us from trim.
max_roll_delta_pwm = 70
max_pitch_delta_pwm = 80
max_yaw_delta_pwm = 50
roll_full_scale_mps = 0.5
pitch_full_scale_mps = 0.5
yaw_full_scale_rad_s = 0.5
# Marker centering uses its own scale so line-follow remains gentle while
# marker braking can still take enough pitch authority.
marker_roll_full_scale_mps = 0.45
marker_pitch_full_scale_mps = 0.35
marker_servo_kp_x = 0.28
marker_servo_kp_y = 0.20
marker_servo_kd_x = 0.08
marker_servo_kd_y = 0.30
marker_servo_max_lateral_mps = 0.18
marker_servo_max_forward_mps = 0.20
marker_servo_max_reverse_mps = 0.35
marker_servo_max_rate_mps = 0.10
marker_servo_derivative_alpha = 0.35
takeoff_timeout_s = 25.0

[marker_hover]
hold_s = 3.0
center_tolerance_px = 30.0
recenter_timeout_s = 1.25
center_kp = 0.28
max_marker_mps = 0.18
deadband_norm = 0.03
output_ema_alpha = 0.45
max_marker_rate_mps = 0.025
approach_timeout_s = 25.0
lost_timeout_s = 5.0
invert_x = false
invert_y = true
