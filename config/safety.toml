[timeouts]
line_lost_ms = 2000
gcs_link_lost_ms = 5000
autopilot_heartbeat_lost_ms = 2000
mission_timeout_ms = 300000

[rc]
assume_rc_present = true
rc_required = false
rc_lost_ms = 1500

# Preflight EKF readiness gate (real-flight GUIDED bring-up).
# ArduCopter accepts GUIDED only when the EKF horizontal-position and velocity
# innovation ratios are below ~1.0. The onboard gate enforces the same bound so
# it predicts GUIDED acceptance instead of passing on flag bits alone. Only
# enforced when the FC reports the ratios in EKF_STATUS_REPORT.
[preflight]
ekf_pos_horiz_variance_max = 1.0
ekf_velocity_variance_max = 1.0

[battery]
# 4S LiPo (PT-B8000-FX35, 14.8V nominal): 3.5V/cell advisory floor.
# Not enforced by onboard code today — hard limits live in the FC params
# (BATT_LOW_VOLT / BATT_CRT_VOLT in config/pixhawk6c_indoor_flow.params).
# The previous 10.5 was a 3S-era value.
low_voltage_v = 14.0
