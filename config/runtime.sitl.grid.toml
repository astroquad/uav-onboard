# Runtime profile for SITL grid arena (grid_arena_test_world).
# Use with: ./build/uav_onboard --target sitl --vision gazebo --world grid

[runtime]
target = "sitl"
vision = "gazebo"
world  = "grid"

[transport]
kind = "udp"
listen_host = "0.0.0.0"
listen_port = 14550

[safety.timeouts]
line_lost_ms = 2000
pixhawk_heartbeat_lost_ms = 3000
mission_timeout_ms = 600000

[safety.rc]
assume_rc_present = true
rc_required = false
rc_lost_ms = 1500

[vision.source]
# Grid arena world topic. CLI --gazebo-topic still overrides this.
gazebo_topic = "/world/grid_arena_test_world/model/iris_with_downward_camera/link/downward_camera_link/sensor/downward_camera/image"
read_timeout_ms = 2000

[debug_video]
enabled = false
send_fps = 12
jpeg_quality = 70
chunk_pacing_us = 150

[line_controller]
offset_kp = 0.35
angle_yaw_kp = 0.5
offset_yaw_kp = 0.0
max_lateral_mps = 0.35
max_yaw_rate_rad_s = 0.35
min_confidence = 0.35
offset_deadband_norm = 0.03
angle_deadband_deg = 3.0
output_ema_alpha = 0.4

[marker_hover]
hold_s = 3.0
center_tolerance_px = 30.0
center_tolerance_norm = 0.10
min_s = 0.8
center_stable_frames = 2
recenter_timeout_s = 1.25
center_kp = 0.28
max_marker_mps = 0.18
deadband_norm = 0.03
output_ema_alpha = 0.45
max_marker_rate_mps = 0.025
approach_timeout_s = 25.0
lost_timeout_s = 5.0
invert_x = false
invert_y = true
