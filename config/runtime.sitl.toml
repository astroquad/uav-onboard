[runtime]
target = "sitl"
vision = "gazebo"

[transport]
kind = "udp"
listen_host = "0.0.0.0"
listen_port = 14550

[safety.timeouts]
line_lost_ms = 2000
pixhawk_heartbeat_lost_ms = 3000
mission_timeout_ms = 300000

[vision.source]
gazebo_topic = "/world/astroquad_iris_vision/model/iris_with_downward_camera/link/downward_camera_link/sensor/downward_camera/image"
read_timeout_ms = 2000

[debug_video]
enabled = false
send_fps = 12
jpeg_quality = 70
chunk_pacing_us = 150

[line_follow]
forward_mps = 0.3
duration_s = 15.0

[marker_hover]
hold_s = 3.0
center_tolerance_px = 80.0
