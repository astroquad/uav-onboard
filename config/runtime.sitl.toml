[runtime]
target = "sitl"
vision = "gazebo"

[transport]
kind = "udp"
listen_host = "0.0.0.0"
listen_port = 14550

[safety.timeouts]
line_lost_ms = 2000
autopilot_heartbeat_lost_ms = 3000
mission_timeout_ms = 300000

[safety.rc]
assume_rc_present = true
rc_required = false
rc_lost_ms = 1500

[vision.source]
gazebo_topic = "/world/line_tracing_test_world/model/iris_with_downward_camera/link/downward_camera_link/sensor/downward_camera/image"
read_timeout_ms = 2000

[debug_video]
enabled = false
send_fps = 12
jpeg_quality = 70
chunk_pacing_us = 150

[line_follow]
forward_mps = 0.25
desired_angle_deg = 90.0
duration_s = 60.0

[line_controller]
offset_kp = 0.35
# Reduced angle_yaw_kp from 1.0 to 0.5 to halve yaw response to angle errors.
# This is the single most impactful change for reducing yaw oscillation.
angle_yaw_kp = 0.5
# Reduced offset_yaw_kp from 0.25 to 0.0 to stop lateral offset from
# driving yaw. Lateral displacement is corrected via vy (lateral velocity)
# alone. Yaw only responds to detected line angle error.
offset_yaw_kp = 0.0
max_lateral_mps = 0.35
# Reduced max yaw rate from 0.6 to 0.35 rad/s (~20 deg/s) for smoother heading.
max_yaw_rate_rad_s = 0.35
min_confidence = 0.35
offset_deadband_norm = 0.03
angle_deadband_deg = 3.0
invert_lateral = false
invert_yaw = false
# Output EMA smoothing: blend 40% new command with 60% previous command.
output_ema_alpha = 0.4

[rc_override]
# ArduPilot SITL normally accepts RC override from GCS system id 255.
sender_system_id = 255
arm_throttle_pwm = 1000
throttle_hold_pwm = 1500
# 1600 can sit on the AltHold throttle deadband edge in SITL, so use a
# slightly clearer climb command for the simulation path.
takeoff_throttle_pwm = 1700
max_roll_delta_pwm = 80
max_pitch_delta_pwm = 100
max_yaw_delta_pwm = 60
# RC override is stick input, not velocity control. These scales say how much
# requested pseudo-velocity maps to full stick delta. A 0.25m/s forward command
# therefore maps to 25% of max_pitch_delta_pwm.
roll_full_scale_mps = 0.8
pitch_full_scale_mps = 1.0
yaw_full_scale_rad_s = 0.8
# ALT_HOLD-only marker visual servo: stronger stick scale is used only while
# visually centering over an ArUco marker.
marker_roll_full_scale_mps = 0.45
marker_pitch_full_scale_mps = 0.35
marker_servo_kp_x = 0.35
marker_servo_kp_y = 0.22
marker_servo_kd_x = 0.10
marker_servo_kd_y = 0.40
marker_servo_max_lateral_mps = 0.25
marker_servo_max_forward_mps = 0.30
marker_servo_max_reverse_mps = 0.45
marker_servo_max_rate_mps = 0.25
marker_servo_derivative_alpha = 0.35
takeoff_timeout_s = 20.0

[marker_hover]
hold_s = 3.0
center_tolerance_px = 30.0
center_tolerance_norm = 0.10
min_s = 0.8
center_stable_frames = 2
recenter_timeout_s = 1.25
center_kp = 0.28
max_marker_mps = 0.18
deadband_norm = 0.03
output_ema_alpha = 0.45
max_marker_rate_mps = 0.025
approach_timeout_s = 25.0
lost_timeout_s = 5.0
invert_x = false
invert_y = true
