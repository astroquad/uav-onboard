[camera]
index = 0
device = 0
# Raspberry Pi Global Shutter Camera (IMX296 mono, fixed-focus CS-mount).
# Single native sensor mode 1456x1088@10bit; frames are decoded grayscale.
# No autofocus/AWB/chroma controls — those were IMX519-era settings.
sensor_model = "imx296"
width = 1456
height = 1088
fps = 24
codec = "mjpeg"
jpeg_quality = 45
# 'sport' biases short shutter times (less motion blur at mission speed).
# AT THE VENUE: lock auto-exposure by setting shutter_us/gain to values
# measured over the actual grass — AE hunting across alternating grass /
# white-line scenes modulates brightness and destabilizes the line mask.
exposure = "sport"
shutter_us = 0    # >0 fixes shutter in microseconds (venue-measured)
gain = 0.0        # >0 fixes analog gain (set together with shutter_us)
ev = 0.0
metering = ""
denoise = ""      # cdn_* is chroma denoise; meaningless on a mono sensor
sharpness = 0.0
contrast = 0.0
brightness = 0.0
roi = ""
tuning_file = ""
hflip = false
vflip = false
rotation = 0

[source]
gazebo_topic = "/world/line_tracing_test_world/model/iris_with_downward_camera/link/downward_camera_link/sensor/downward_camera/image"
read_timeout_ms = 1000
fake_line_offset_px = 0.0
fake_line_angle_deg = 0.0

[video]
# Legacy video defaults kept for older tooling/config compatibility.
# Current rpicam capture uses [camera], and best-effort GCS debug video pacing
# uses [debug_video].
width = 640
height = 480
fps = 24
jpeg_quality = 45
send_fps = 5
chunk_pacing_us = 150
port = 5600

[debug_video]
enabled = false
# GCS debug video is monitoring-only. Defaults are sized for the measured
# competition LTE uplink (~2.4 Mbit/s clean zone, 3-4 Mbit/s loss knee), NOT
# for LAN throughput: 12 fps at 600px/q55 plus capped telemetry and FEC
# measures ~2.1-2.2 Mbit/s (see README "LTE / constrained-link operation").
# Raise via --fps/--video-width/--video-quality only after probing a faster
# path; send_fps = 0 would forward every processed frame (~24 fps, ~4-5
# Mbit/s) which stutters on LTE.
send_fps = 12
jpeg_quality = 55
chunk_pacing_us = 150
send_width = 600
send_height = 0
# XOR parity packet every N data chunks; the GCS reconstructs one lost
# chunk per group (protocol v1.13). ~25% bandwidth overhead at 4; set 0
# to disable on a clean LAN.
fec_group_size = 4

[line]
enabled = true
mode = "light_on_dark"
mask_strategy = "white_fill"
offset_normalized = false
roi_top_ratio = 0.08
lookahead_y_ratio = 0.55
lookahead_band_ratio = 0.06
threshold = 0
local_contrast_blur = 31
local_contrast_threshold = 10
white_v_min = 145
white_s_max = 90
dark_v_max = 85
min_area_px = 250
morph_kernel = 5
morph_open_kernel = 1
morph_close_kernel = 7
morph_dilate_kernel = 1
fill_close_kernel = 11
fill_dilate_kernel = 3
dark_fill_close_kernel = 13
dark_fill_dilate_kernel = 3
line_run_merge_gap_px = 16
max_contour_points = 48
confidence_min = 0.25
min_line_width_px = 8
max_line_width_ratio = 0.22
dark_max_line_width_ratio = 0.34
process_width = 480
max_candidates = 8
filter_enabled = true
filter_ema_alpha = 0.2
filter_confidence_alpha_min = 0.2
filter_min_confidence = 0.25
filter_max_offset_jump_ratio = 0.08
filter_max_offset_velocity_ratio = 0.04
filter_max_angle_jump_deg = 90.0
filter_hold_frames = 6
filter_reacquire_frames = 6
intersection_threshold = 0.8
marker_mask_enabled = true
marker_mask_detect_candidates = true
# Occlusion polygons are scaled about the marker centroid. The printed marker
# card carries a thin 5cm-wide white ArUco quiet zone (0.60m card vs 0.50m
# marker, no separate mounting platform) that must be erased too or its
# white ring survives as a false line contour. 1.2 exactly covers the 5cm
# margin around the marker's own detected corners (0.25m half-side * 1.2 =
# 0.30m); 1.3 adds a little slack for corner-detection/stabilizer noise
# without eating the real grid lines around marker intersections.
marker_occlusion_scale = 1.3

[intersection_decision]
enabled = true
fps_assumption = 24
cruise_window_frames = 12
turn_confirm_frames = 16
cooldown_frames = 16
min_cross_branch_frames = 4
min_t_branch_frames = 4
min_l_branch_frames = 6
min_branch_score = 0.72
high_confidence_score = 0.85
candidate_min_frames = 4
turn_confirm_required = 6
record_node_once_frames = 36
turn_zone_y_min = 0.42
turn_zone_y_max = 0.68
late_zone_y = 0.78
min_prearm_frames = 4
front_missing_frames = 4
node_advance_min_frames = 8
# Cycle 8: NodeRecord is only emitted when the detected intersection centre
# lies inside this normalized Y band. Avoids latching false nodes off the
# frame top edge where partial T/+/L geometry yields fused angles.
node_record_y_min = 0.40
node_record_y_max = 0.65

[aruco]
dictionary = "DICT_4X4_50"
# Competition markers are 50cm (0.5m) printed cards laid directly on grass at
# grid intersections, with a thin white ArUco quiet zone (~1 module) around
# the black border — no separate white mounting platform. Currently
# informational only (no pose estimation consumes it); the previous 80.0 was
# a bench-marker leftover.
marker_size_mm = 500.0
# Cycle 11: raised 0.03 -> 0.05 to reject small candidate quads that the
# ArUco detector picks up at grid intersections (cross / T) and misclassifies
# as real markers. A 50cm marker at ~2m altitude is far above 5% of the
# image perimeter; re-validate min/max against the real-field corpus.
min_marker_perimeter_rate = 0.05
max_marker_perimeter_rate = 4.0
adaptive_thresh_win_size_min = 3
adaptive_thresh_win_size_max = 23
adaptive_thresh_win_size_step = 10
# Targeted re-detection around partial primary detections (safe: seeded by a
# real detection). The blind bright-blob sweep and synthetic-template matcher
# below are the main grass false-positive sources — OPT-IN only; re-enable
# only if the real-field corpus shows the primary detector missing markers.
roi_fallback_enabled = true
# Dark-square ROI path: the printed marker's own quiet zone is thin (~1
# module) and can still fail the primary ArUco candidate stage against
# textured/dark grass at low camera resolution or blur. This finds dark
# square blobs and re-runs detection inside a tight ROI padded with synthetic
# white, as a defense-in-depth path alongside the primary detector.
dark_roi_fallback_enabled = true
dark_fallback_max_rois = 8
bright_roi_fallback_enabled = false
template_fallback_enabled = false
detect_interval_frames = 6
fallback_max_components = 12
fallback_max_rois = 120
full_fallback_interval_frames = 24
full_fallback_max_rois = 4
hold_frames = 18
