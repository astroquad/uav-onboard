[camera]
index = 0
device = 0
sensor_model = "imx519"
width = 960
height = 720
fps = 12
codec = "mjpeg"
jpeg_quality = 45
autofocus_mode = "manual"
autofocus_range = "normal"
autofocus_speed = "normal"
lens_position = 0.67
exposure = "sport"
shutter_us = 0
gain = 0.0
ev = 0.0
awb = "auto"
awbgains = ""
metering = ""
denoise = "cdn_fast"
sharpness = 0.0
contrast = 0.0
brightness = 0.0
saturation = 0.0
roi = ""
tuning_file = ""
hflip = false
vflip = false
rotation = 0

[video]
# Legacy video defaults kept for older tooling/config compatibility.
# Current rpicam capture uses [camera], and best-effort GCS debug video pacing
# uses [debug_video].
width = 640
height = 480
fps = 12
jpeg_quality = 45
send_fps = 10
chunk_pacing_us = 150
port = 5600

[debug_video]
enabled = true
send_fps = 8
jpeg_quality = 40
chunk_pacing_us = 150
send_width = 0
send_height = 0

[line]
enabled = true
mode = "light_on_dark"
mask_strategy = "local_contrast"
offset_normalized = false
roi_top_ratio = 0.08
lookahead_y_ratio = 0.55
lookahead_band_ratio = 0.06
threshold = 0
local_contrast_blur = 31
local_contrast_threshold = 10
min_area_px = 250
morph_kernel = 5
morph_open_kernel = 1
morph_close_kernel = 7
morph_dilate_kernel = 1
line_run_merge_gap_px = 16
max_contour_points = 48
confidence_min = 0.25
min_line_width_px = 8
max_line_width_ratio = 0.22
process_width = 480
max_candidates = 8
filter_enabled = true
filter_ema_alpha = 0.35
filter_confidence_alpha_min = 0.35
filter_min_confidence = 0.25
filter_max_offset_jump_ratio = 0.16
filter_max_offset_velocity_ratio = 0.08
filter_max_angle_jump_deg = 90.0
filter_hold_frames = 3
filter_reacquire_frames = 3
intersection_threshold = 0.8

[aruco]
dictionary = "DICT_4X4_50"
marker_size_mm = 80.0
min_marker_perimeter_rate = 0.03
max_marker_perimeter_rate = 4.0
adaptive_thresh_win_size_min = 3
adaptive_thresh_win_size_max = 23
adaptive_thresh_win_size_step = 10
