[mission]
grid_rows = 0
grid_cols = 0
marker_count = 0
snake_start_direction = "east"

[grid_mission]
vertiport_marker_id = 23
markers_expected = 4
vertiport_altitude_m = 2.0
cruise_altitude_m = 2.0
# Cycle 16: MarkerLockYaw (merged VertiportVerify + VertiportYawAlign).
vertiport_verify_timeout_s = 8.0
vertiport_marker_stable_frames = 3
vertiport_yaw_tolerance_deg = 5.0
marker_lock_center_tol_norm = 0.05
# Cycle 16: yaw rotation applied during MarkerLockYaw. ArduPilot/NED
# convention: positive yaw_rate is clockwise (right), so +90 rotates the
# drone to the right; -90 would rotate to the left (CCW).
marker_lock_yaw_delta_deg = 90.0
# Cycle 16: EntryForward — yaw-frozen freeflight from the vertiport to the
# first grid intersection. No vertiport->grid line in the new arena, and
# vertiport texture can produce false L/T/+ candidates, so entry uses only
# LOCAL_NED displacement while yaw is frozen.
entry_forward_timeout_s = 25.0
entry_forward_speed_mps = 0.30
# Cycle 17: ignore vision only until the vehicle has clearly left the 3m x 3m
# vertiport pad. After this guard clears, wait for the actual first L/T/+
# grid intersection instead of guessing the (0,0) position from distance.
entry_blind_clear_distance_m = 1.80
entry_blind_min_s = 0.0
entry_blind_min_frames = 0
entry_intersection_min_distance_m = 1.80
entry_center_timeout_s = 12.0
entry_center_target_y_norm = 0.55
entry_center_late_y_norm = 0.78
entry_center_x_tolerance_norm = 0.08
entry_center_y_tolerance_norm = 0.06
entry_center_velocity_threshold_mps = 0.08
entry_center_stable_frames = 3
entry_center_forward_kp = 0.55
entry_center_lateral_kp = 0.20
entry_center_max_forward_mps = 0.20
entry_center_max_reverse_mps = 0.08
entry_center_max_lateral_mps = 0.12
cell_size_m = 3.0
snake_record_lockout_s = 3.0
snake_turn_lockout_s = 3.0
snake_marker_hover_s = 3.0
marker_hover_min_s = 0.8
marker_hover_center_tolerance_norm = 0.10
marker_hover_center_stable_frames = 2
snake_stop_velocity_threshold_mps = 0.05
# Cycle 13: bumped 8.0 -> 15.0 to accommodate post-turn blind + hop traversal.
snake_advance_timeout_s = 15.0
# Cycle 13: was hard-coded 0.18 in GridControlMapperConfig; raised to 0.30.
forward_speed_advance_mps = 0.30
max_intersections = 50
mission_timeout_s = 600.0
altitude_ceiling_m = 3.5
snake_complete_hover_s = 2.0
# Cycle 16: hop-to-hop dwell at each non-marker intersection. The drone holds
# position for this many seconds while the IntersectionDecision settles on a
# definitive L/T/+ classification. Marker intersections override with
# snake_marker_hover_s (3.0s).
snake_record_dwell_s = 0.5
# Cycle 10: after a NodeRecord, the boundary watchdog in SnakeForward is
# disabled for this many seconds so the just-recorded node's residual
# T/L branches don't immediately re-trigger as a boundary.
snake_post_record_grace_s = 0.8
# Cycle 12: forward guard duration after each 90° turn (SnakeTurn90 and
# SnakeTurn90Again). The camera moves into the new corridor before arrival
# decisions are accepted.
snake_post_turn_blind_s = 1.5
# Forward hops stay in ForwardBlind for the full cell. Yaw is mission-locked;
# lateral vy line-centering is applied continuously when a confident straight
# corridor is visible.
# Distance failsafe — if the next intersection has not been observed within
# this many metres of the last commit, abort the hop.
hop_max_distance_m = 3.5
# Minimum LOCAL_NED distance from the last commit before a new NodeRecord is
# honoured; defends against the just-departed node's residual lookahead.
# Cycle 22: bumped 1.0 -> 2.0. With cell_size 3m, the wide-FOV downward camera
# keeps the previous boundary T visible for ~1.5m after a column-transition
# 90° turn (since the boundary's side branches now sit in the camera's
# back-half). At hop=1.0m that residual mask was firing premature node_record
# events in SnakeAdvanceOneCell, advancing the tracker coord by a full cell
# while the drone had only travelled ~1/3 cell — leaving the drone stuck in
# SnakeLaunchAlign perpendicular to the connector line.
hop_intersection_min_distance_m = 2.0
# Launchpad alignment: after an intersection is centered and the forward branch
# exists, align yaw/lateral on the outgoing line before freezing yaw and
# launching to the next node.
snake_launch_align_timeout_s = 3.0
snake_launch_align_stable_frames = 2
snake_launch_line_min_confidence = 0.35
snake_launch_line_center_tolerance_norm = 0.06
snake_launch_line_angle_tolerance_deg = 3.0
# Cycle 12: cy-feedback deceleration in SnakeStopAtCenter.
stop_center_target_cy = 0.55
stop_center_max_vx_mps = 0.10
stop_center_taper_gap = 0.30
initial_snake_turn = "auto"  # auto | left | right
# Cycle 16: sliding-window ArUco stability. Marker ID must appear at least
# marker_window_min_count times within the last marker_window_frames camera
# frames to be committed. The window flushes whenever two different IDs are
# seen inside it (camera is ambiguous).
marker_window_frames = 8
marker_window_min_count = 4

[takeoff]
target_altitude_m = 2.0
altitude_reached_ratio = 0.9
settle_s = 2.0

[altitude_hold]
kp = 0.4
max_vz_mps = 0.35
deadband_m = 0.08

[line_follow]
forward_mps = 0.25
center_error_norm = 0.0
line_angle_deg = 90.0
desired_angle_deg = 90.0
duration_s = 60.0
lost_timeout_s = 3.0

[line_controller]
# Lateral-velocity P-gain on normalized horizontal center error.
offset_kp = 0.35
# Yaw-rate P-gain on detected-vs-desired line angle error.
# Keep modest; high values are the main cause of head-shake oscillation.
angle_yaw_kp = 0.5
# Cross-coupling from offset to yaw. 0 disables the loop that turns the
# vehicle toward the line based on lateral displacement; lateral error is
# corrected by vy instead. Recommended default.
offset_yaw_kp = 0.0
max_lateral_mps = 0.35
max_yaw_rate_rad_s = 0.35
min_confidence = 0.35
offset_deadband_norm = 0.03
angle_deadband_deg = 3.0
invert_lateral = false
invert_yaw = false
# EMA smoothing on the final vy/yaw commands. 1.0 disables smoothing.
# Lower values are smoother but add lag; 0.3-0.5 is a typical sweet spot.
output_ema_alpha = 0.4
# Per-step rate limits (m/s and rad/s of change per control tick).
# At 20 Hz, 0.025 limits acceleration to ~0.5 m/s/s and ~0.5 rad/s/s.
# 0 disables.
max_lateral_rate_mps = 0.0
max_yaw_rate_change_rad_s = 0.0
# Reduce forward speed when detection confidence is low.
# 0 disables; values > 0 use std::pow(confidence, forward_confidence_scale).
forward_confidence_scale = 0.0

[marker_hover]
hold_s = 3.0
center_tolerance_px = 30.0
center_tolerance_norm = 0.10
min_s = 0.8
center_stable_frames = 2
recenter_timeout_s = 1.25
center_kp = 0.28
max_marker_mps = 0.18
deadband_norm = 0.03
output_ema_alpha = 0.45
max_marker_rate_mps = 0.025
approach_timeout_s = 25.0
lost_timeout_s = 5.0
invert_x = false
invert_y = true
