[mission]
grid_rows = 0
grid_cols = 0
marker_count = 0
snake_start_direction = "east"

[grid_mission]
vertiport_marker_id = 23
markers_expected = 4
vertiport_altitude_m = 2.0
cruise_altitude_m = 2.0
vertiport_verify_timeout_s = 8.0
vertiport_marker_stable_frames = 3
vertiport_yaw_tolerance_deg = 5.0
off_pad_timeout_s = 15.0
off_pad_distance_trigger_m = 3.0
off_pad_line_locked_frames = 3
line_enter_timeout_s = 10.0
cell_size_m = 3.0
snake_record_lockout_s = 3.0
snake_turn_lockout_s = 3.0
snake_marker_hover_s = 3.0
snake_line_lost_warn_s = 4.0
snake_line_lost_emergency_s = 8.0
snake_stop_velocity_threshold_mps = 0.05
# Cycle 13: bumped 8.0 -> 15.0. With forward_speed_advance_mps=0.30 and
# snake_post_turn_blind_s=1.5, the post-blind line-follow window is
# (15 - 1.5) * 0.30 = 4.05m which comfortably exceeds cell_size_m=3.0.
snake_advance_timeout_s = 15.0
# Cycle 13: was hard-coded 0.18 in GridControlMapperConfig; raised to 0.30 so
# SnakeAdvanceOneCell can traverse one cell within snake_advance_timeout_s
# while still allowing the line controller time to recentre after a turn.
forward_speed_advance_mps = 0.30
max_intersections = 50
mission_timeout_s = 600.0
altitude_ceiling_m = 3.5
snake_complete_hover_s = 2.0
# Cycle 9: marker must be seen for N consecutive frames before being treated
# as a real candidate. Guards against 1-2 frame ArUco false positives.
# Cycle 11: raised 3 -> 6 because OpenCV ArUco occasionally locks onto
# intersection cross/T patterns for 3+ frames and would otherwise commit fake
# IDs (e.g. id=1, id=7 at a non-marker intersection).
marker_observation_min_frames = 6
# Cycle 9: dwell at every non-marker intersection while decelerating
# (forward_speed_advance_mps). Marker intersections override with
# snake_marker_hover_s.
snake_record_dwell_s = 0.3
# Cycle 10: after a NodeRecord, the boundary watchdog in SnakeForward is
# disabled for this many seconds so the just-recorded node's residual
# T/L branches don't immediately re-trigger as a boundary.
snake_post_record_grace_s = 0.8
# Cycle 12: blind forward duration after each 90° turn (SnakeTurn90 and
# SnakeTurn90Again). Mirrors the off-pad-forward pattern so the camera moves
# into the new corridor before re-engaging line tracking.
snake_post_turn_blind_s = 2.5
# Cycle 12: cy-feedback deceleration in SnakeStopAtCenter. The drone keeps
# moving forward at a tapered slow speed until the intersection center
# reaches stop_center_target_cy, producing a position-based precision stop.
stop_center_target_cy = 0.55
stop_center_max_vx_mps = 0.10
stop_center_taper_gap = 0.30
initial_snake_turn = "auto"  # auto | left | right

[takeoff]
target_altitude_m = 2.0
altitude_reached_ratio = 0.9
settle_s = 2.0

[altitude_hold]
kp = 0.4
max_vz_mps = 0.35
deadband_m = 0.08

[line_follow]
forward_mps = 0.25
center_error_norm = 0.0
line_angle_deg = 90.0
desired_angle_deg = 90.0
duration_s = 60.0
lost_timeout_s = 3.0

[line_controller]
# Lateral-velocity P-gain on normalized horizontal center error.
offset_kp = 0.35
# Yaw-rate P-gain on detected-vs-desired line angle error.
# Keep modest; high values are the main cause of head-shake oscillation.
angle_yaw_kp = 0.5
# Cross-coupling from offset to yaw. 0 disables the loop that turns the
# vehicle toward the line based on lateral displacement; lateral error is
# corrected by vy instead. Recommended default.
offset_yaw_kp = 0.0
max_lateral_mps = 0.35
max_yaw_rate_rad_s = 0.35
min_confidence = 0.35
offset_deadband_norm = 0.03
angle_deadband_deg = 3.0
invert_lateral = false
invert_yaw = false
# EMA smoothing on the final vy/yaw commands. 1.0 disables smoothing.
# Lower values are smoother but add lag; 0.3-0.5 is a typical sweet spot.
output_ema_alpha = 0.4
# Per-step rate limits (m/s and rad/s of change per control tick).
# At 20 Hz, 0.025 limits acceleration to ~0.5 m/s/s and ~0.5 rad/s/s.
# 0 disables.
max_lateral_rate_mps = 0.0
max_yaw_rate_change_rad_s = 0.0
# Reduce forward speed when detection confidence is low.
# 0 disables; values > 0 use std::pow(confidence, forward_confidence_scale).
forward_confidence_scale = 0.0

[marker_hover]
hold_s = 3.0
center_tolerance_px = 30.0
recenter_timeout_s = 1.25
center_kp = 0.20
max_marker_mps = 0.15
deadband_norm = 0.04
output_ema_alpha = 0.35
max_marker_rate_mps = 0.012
approach_timeout_s = 25.0
lost_timeout_s = 5.0
invert_x = false
invert_y = true
