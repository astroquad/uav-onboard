[gcs]
# Destination for telemetry/debug video. Known names are resolved through
# src/common/KnownHosts.hpp (gcs-laptop = Lenovo GCS laptop over Tailscale,
# pi5 = this Raspberry Pi, broadcast = 255.255.255.255). A literal IP also
# works. Use "broadcast" (or --gcs-ip broadcast) for LAN/WSL beacon
# discovery when Tailscale is not in use.
ip = "gcs-laptop"
telemetry_port = 14550
command_port = 14551
video_port = 5600

[telemetry]
send_interval_ms = 1000
# Frame-telemetry rate cap for the vision/mission runtimes. Default 6 fps is
# part of the measured LTE recipe (~0.25 Mbit/s of the ~2.2 Mbit/s budget);
# GCS overlays fall back to nearest-timestamp matching for frames without
# telemetry, and mission state still updates several times per second.
# 0 would send one message per processed camera frame (~5.5KB, ~1.1 Mbit/s
# at 24fps) — LAN only. Override per run with --telemetry-fps.
send_fps = 6
